    <div id="pivot-container_1H" style="width: 100%; height: 500px;">
        <script>
            let pivot; // Declare pivot variable for global access
    
            document.addEventListener('DOMContentLoaded', function () {
                try {
                    const eventsData = JSON.parse('{{ events_json|escapejs }}');
    
                    console.log("Raw Events Data:", eventsData); // Log raw data
    
                    if (!Array.isArray(eventsData) || eventsData.length === 0) {
                        console.warn("No events data available.");
                        return; // Exit if no data to display
                    }
    
                    // Create a temporary object to aggregate counts by time interval
                    const aggregatedData = {};
    
                    eventsData.forEach(item => {
                        const fields = item.fields;
                        if (fields) {
                            const dateCreated = new Date(fields.date_created).toISOString().slice(0, 13) + ":00:00"; // Hourly grouping
                            const nodeId = fields.node_id || 'Unknown';
                            const loc = fields.loc || 'Unknown';
                            const temp = parseFloat(fields.temp) || 0;
                            const hum = parseFloat(fields.hum) || 0;
                            const light = parseInt(fields.light, 10) || 0;
                            const snd = parseInt(fields.snd, 10) || 0;
    
                            // Initialize if not already present
                            if (!aggregatedData[dateCreated]) {
                                aggregatedData[dateCreated] = {};
                            }
                            
                            // Initialize node if not already present
                            if (!aggregatedData[dateCreated][nodeId]) {
                                aggregatedData[dateCreated][nodeId] = {
                                    loc: loc,
                                    temp: 0,
                                    hum: 0,
                                    light: 0,
                                    snd: 0,
                                    count: 0 // Initialize count
                                };
                            }
    
                            // Aggregate values
                            aggregatedData[dateCreated][nodeId].temp += temp;
                            aggregatedData[dateCreated][nodeId].hum += hum;
                            aggregatedData[dateCreated][nodeId].light += light;
                            aggregatedData[dateCreated][nodeId].snd += snd;
                            aggregatedData[dateCreated][nodeId].count += 1; // Increment count
                        }
                    });
    
                    // Create an array of time intervals
                    const timeIntervals = [];
                    const startTime = new Date(Math.min(...eventsData.map(item => new Date(item.fields.date_created))));
                    const endTime = new Date(Math.max(...eventsData.map(item => new Date(item.fields.date_created))));
                    
                    for (let dt = startTime; dt <= endTime; dt.setHours(dt.getHours() + 1)) {
                        timeIntervals.push(dt.toISOString().slice(0, 13) + ":00:00");
                    }
    
                    // Fill missing intervals
                    const processedData = [];
                    timeIntervals.forEach(date => {
                        if (aggregatedData[date]) {
                            Object.keys(aggregatedData[date]).forEach(nodeId => {
                                const data = aggregatedData[date][nodeId];
                                processedData.push({
                                    date_created: date,
                                    node_id: nodeId,
                                    loc: data.loc,
                                    temp: data.temp / (data.count || 1), // Average temperature
                                    hum: data.hum / (data.count || 1),     // Average humidity
                                    light: data.light / (data.count || 1), // Average light intensity
                                    snd: data.snd / (data.count || 1),     // Average sound level
                                    event_count: data.count                  // Count of events
                                });
                            });
                        } else {
                            // Handle missing nodes for this interval
                            for (const nodeId of Object.keys(aggregatedData[date] || {})) {
                                processedData.push({
                                    date_created: date,
                                    node_id: nodeId,
                                    loc: aggregatedData[date][nodeId].loc,
                                    temp: 0,
                                    hum: 0,
                                    light: 0,
                                    snd: 0,
                                    event_count: 0 // Set to zero for missing intervals
                                });
                            }
                        }
                    });
    
                    console.log("Processed Data:", processedData); // Log processed data
    
                    // Initialize Flexmonster
                    pivot = new Flexmonster({
                        container: "#pivot-container_1H",
                        componentFolder: "https://cdn.flexmonster.com/",
                        report: {
                            dataSource: {
                                data: processedData,
                                mapping: {
                                    "node_id": { "caption": "Node ID", "type": "string" },
                                    "loc": { "caption": "Location", "type": "string" },
                                    "temp": { "caption": "Temperature", "type": "number" },
                                    "hum": { "caption": "Humidity", "type": "number" },
                                    "light": { "caption": "Light Intensity", "type": "number" },
                                    "snd": { "caption": "Sound Level", "type": "number" },
                                    "date_created": { "caption": "Created Date", "interval": "1h", "type": "datetime" },
                                    "event_count": { "caption": "Event Count", "type": "number" }, // New field for event count
                                }
                            },
                            slice: {
                                rows: [
                                    { uniqueName: "date_created" },
                                ],
                                columns: [
                                    { uniqueName: "loc" },
                                    { uniqueName: "node_id" },
                                    { uniqueName: "[measures]" },
                                ],
                                measures: [
                                    { uniqueName: "temp", label: "Temperature", format: "degree", aggregation: "avg" },
                                    { uniqueName: "hum", label: "Humidity", aggregation: "avg" },
                                    { uniqueName: "light", label: "Light Intensity", aggregation: "avg" },
                                    { uniqueName: "snd", label: "Sound Level", aggregation: "avg" },
                                    { uniqueName: "event_count", label: "Number of Events", aggregation: "sum" }, // Sum of events over the interval
                                ],
                            },
                            options: {
                                viewType: "charts",
                                chart: {
                                    type: "line",
                                },
                                showAggregationLabels: false,
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error initializing Flexmonster:", error);
                }
            });
    
            // Function to group dates based on the interval
            function groupDates(interval) {
                let report = pivot.getReport();
                report.dataSource.mapping["date_created"].interval = interval; // Change the interval
                pivot.setReport(report); // Update the report
            }
        </script>
    </div>   

    <div id="pivot-container" style="width: 100%; height: 500px;">
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                try {
                    const eventsData = JSON.parse('{{ events_json|escapejs }}');

                    console.log(eventsData); // Check the raw JSON data

                    if (!Array.isArray(eventsData) || eventsData.length === 0) {
                        console.warn("No events data available.");
                        return; // Exit if no data to display
                    }

                    // Process the data to the format Flexmonster needs
                    const processedData = eventsData.map(item => {
                        const fields = item.fields;
                        if (fields) {
                            return {
                                node_id: fields.node_id,
                                loc: fields.loc,
                                temp: parseFloat(fields.temp) || 0,
                                hum: parseFloat(fields.hum) || 0,
                                light: parseInt(fields.light, 10) || 0,
                                snd: parseInt(fields.snd, 10) || 0,
                                date_created: fields.date_created,
                                date: fields.date,
                                time: fields.time
                            };
                        }
                        return null;
                    }).filter(item => item !== null); // Remove null values

                    console.log(processedData); // Check the processed data

                    new Flexmonster({
                        container: "#pivot-container",
                        componentFolder: "https://cdn.flexmonster.com/",
                        report: {
                            dataSource: {
                                data: processedData,
                                mapping: {
                                    "node_id": { "caption": "Node ID", "type": "string" },
                                    "loc": { "caption": "Location", "type": "string" },
                                    "temp": { "caption": "Temperature", "type": "number" },
                                    "hum": { "caption": "Humidity", "type": "number" },
                                    "light": { "caption": "Light Intensity", "type": "number" },
                                    "snd": { "caption": "Sound Level", "type": "number" },
                                    "date_created": { "caption": "Created Date", "type": "datetime" },
                                }
                            },
                            slice: {
                                rows: [
                                    { uniqueName: "date_created" },
                                ],
                                columns: [
                                    { uniqueName: "loc" },
                                    { uniqueName: "node_id" },
                                    { uniqueName: "[measures]" },

                                measures: [

                                    { uniqueName: "hum", label: "Humidity" },

                                    { uniqueName: "snd", label: "Sound Level" },
                                ],
                            },
                            options: {

                                chart: {
                                    type: "line",
                                },
                                showAggregationLabels: false,
                            }
                        }
                    });
                } catch (error) {
                    console.error("Error initializing Flexmonster:", error);
                }
            });
